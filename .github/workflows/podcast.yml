name: Daily AI News Podcast

on:
  schedule:
    - cron: '0 0 * * *' # 매일 자정 (UTC)
  workflow_dispatch: # 수동 실행 가능

jobs:
  generate-podcast:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install notebooklm-mcp-cli

      - name: Generate Podcast
        env:
          NLM_COOKIES: ${{ secrets.NLM_COOKIES }}
        run: |
          # 1. 뉴스 검색 및 요약 텍스트 생성 (이 부분은 외부 스크립트로 처리하는 것이 좋음)
          # 여기서는 간단히 흐름만 작성합니다.
          
          DATE=$(date +'%Y-%m-%d')
          FILENAME=$(date +'%Y%m%d').mp3
          TITLE="AI News - $DATE"
          
          # nlm 명령어를 사용하여 자동화 (예시)
          # nlm login --manual --file <(echo "$NLM_COOKIES")
          # NOTEBOOK_ID=$(nlm notebook create "$TITLE" --json | jq -r '.notebook_id')
          # nlm source add $NOTEBOOK_ID --text "수집된 뉴스 텍스트..."
          # nlm audio create $NOTEBOOK_ID --confirm
          # nlm download_artifact $NOTEBOOK_ID --type audio --output audio/$FILENAME
          
          # 2. 피드 업데이트
          # python scripts/update_feed.py "$TITLE" "$FILENAME" "Daily AI news summary for $DATE"

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add audio/ feed.xml
          git commit -m "Add daily episode: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
